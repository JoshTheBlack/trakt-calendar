<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register &ndash; Trakt New Shows</title>
  <link rel="shortcut icon" href="/static/images/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body class="auth-page">
<div class="auth-shell">
  <img class="auth-logo" src="/static/images/trakttop.png" alt="Trakt New Shows">
  <div class="auth-card">
    <h1>Create your account</h1>
    <p class="auth-sub">
      An administrator will still need to approve calendar access before you
      can use it, unless your invite already grants it.
    </p>

    <div class="auth-providers">
      {% if trakt_login_configured %}
      <a class="auth-provider-btn ready" href="/auth/trakt/start{% if invite_token %}?invite={{ invite_token | urlencode }}{% endif %}">Sign up with Trakt</a>
      {% endif %}
      <button type="button" class="auth-provider-btn ready" id="plexBtn">Sign up with Plex</button>
    </div>
    <div class="auth-divider">or</div>

    <div class="auth-form">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" type="text" autocomplete="username" autofocus>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="new-password">
      </div>
      <div class="field">
        <label for="confirm">Confirm password</label>
        <input id="confirm" type="password" autocomplete="new-password">
      </div>
      <p class="auth-error" id="error" role="alert"></p>
      <button class="btn-primary" id="submit" type="button">Create account</button>
    </div>

    <div class="auth-links">
      <span>Already have an account? <a href="/login">Sign in</a></span>
    </div>
  </div>
</div>

<script src="/static/js/plex-auth.js"></script>
<script>
const invite = {{ invite_token | tojson }};
const err = document.getElementById('error');
document.getElementById('plexBtn').addEventListener('click', async () => {
  const btn = document.getElementById('plexBtn');
  err.textContent = '';
  btn.disabled = true;
  try {
    const data = await plexAuth({invite: invite});
    window.location = data.redirect || '/';
  } catch (e) {
    err.textContent = e.message || 'Could not sign up with Plex.';
    btn.disabled = false;
  }
});
async function submit() {
  err.textContent = '';
  const btn = document.getElementById('submit');
  btn.disabled = true;
  try {
    const resp = await fetch('/register' + (invite ? ('?invite=' + encodeURIComponent(invite)) : ''), {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
        password_confirm: document.getElementById('confirm').value,
        invite: invite,
      }),
    });
    const data = await resp.json().catch(() => ({}));
    if (resp.ok && data.ok) { window.location = data.redirect || '/'; return; }
    err.textContent = data.error || 'Something went wrong.';
  } catch (e) {
    err.textContent = 'Could not reach the server.';
  }
  btn.disabled = false;
}
document.getElementById('submit').addEventListener('click', submit);
document.addEventListener('keydown', (e) => { if (e.key === 'Enter') submit(); });
</script>
</body>
</html>
